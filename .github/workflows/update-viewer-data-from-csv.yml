name: Update SoilVoc viewer data from source files

on:
  push:
    paths:
      - SoilVoc_concepts.csv
      - VERSION
      - "api/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required for GHCR  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install rdflib pandas

      - name: Restore SoilVoc.ttl from CSV
        run: |
          python restore_soilvoc_from_csv.py \
            --csv SoilVoc_concepts.csv \
            --out SoilVoc.ttl

      # index.html, assets/soilvoc.js, and assets/soilvoc.css are committed
      # static viewer files. Only assets/soilvoc_data.json is regenerated here.
      - name: Generate assets/soilvoc_data.json
        run: |
          VERSION=$(cat VERSION)
          python -c "
          import generate_soilvoc_html as m
          v = m.parse_skos_vocabulary_enhanced('SoilVoc.ttl')
          m.generate_viewer_data(v, 'assets', version='${VERSION}')
          "

      - name: Commit updated files
        run: |
          git diff --quiet -- SoilVoc.ttl assets/soilvoc_data.json && {
            echo "No changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SoilVoc.ttl assets/soilvoc_data.json
          git commit -m "Auto-update SoilVoc.ttl and soilvoc_data.json from source files [skip ci]"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: vars
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}
            ghcr.io/${{ github.repository }}:latest
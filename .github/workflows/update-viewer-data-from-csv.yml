name: Update SoilVoc viewer data from source files

on:
  push:
    paths:
      - SoilVoc_concepts.csv
      - assets/VERSION
      - "api/**"
      - "scripts/**"
      - "docker/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write   # required for GHCR  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install rdflib pandas

      - name: Restore temporary TTL from CSV
        env:
          RESTORED_TTL: ${{ runner.temp }}/SoilVoc_restored.ttl
        run: |
          python scripts/restore_soilvoc_from_csv.py \
            --csv SoilVoc_concepts.csv \
            --out "$RESTORED_TTL"

      # index.html, assets/soilvoc.js, and assets/soilvoc.css are committed
      # static viewer files. A temporary restored TTL is used only to regenerate
      # assets/soilvoc_data.json and is not committed.
      - name: Generate assets/soilvoc_data.json
        env:
          RESTORED_TTL: ${{ runner.temp }}/SoilVoc_restored.ttl
        run: |
          python scripts/generate_soilvoc_html.py \
            --ttl "$RESTORED_TTL" \
            --output-dir assets \
            --version-file assets/VERSION

      - name: Commit updated files
        run: |
          git diff --quiet -- assets/soilvoc_data.json && {
            echo "No changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/soilvoc_data.json
          git commit -m "Auto-update soilvoc_data.json from source files [skip ci]"
          git push

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: vars
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.TAG }}
            ghcr.io/${{ github.repository }}:latest

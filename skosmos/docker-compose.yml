name: soilvoc-skosmos

services:
  fuseki:
    profiles:
      - local-fuseki
    hostname: fuseki
    build:
      context: ./fuseki
      dockerfile: Dockerfile
      args:
        JENA_VERSION: ${JENA_VERSION:-5.4.0}
    command: --config=/fuseki/config/skosmos.ttl
    environment:
      - JAVA_OPTIONS=-Xmx2g -Xms1g
    ports:
      - ${FUSEKI_PORT:-9030}:3030
    volumes:
      - ./config/fuseki-skosmos.ttl:/fuseki/config/skosmos.ttl:ro
      - fuseki-databases:/fuseki/databases
      - fuseki-logs:/fuseki/logs
    user: "fuseki:fuseki"

  fuseki-cache:
    profiles:
      - local-fuseki
    hostname: fuseki-cache
    image: varnish
    security_opt:
      - seccomp:unconfined
    ports:
      - ${CACHE_PORT:-9031}:80
    volumes:
      - type: bind
        source: ./config/varnish-default.vcl
        target: /etc/varnish/default.vcl
        read_only: true
    depends_on:
      - fuseki

  skosmos:
    hostname: skosmos
    image: ${SKOSMOS_IMAGE:-soilvoc-skosmos:arm64}
    ports:
      - ${SKOSMOS_PORT:-9090}:80
    volumes:
      - type: bind
        source: ${SKOSMOS_CONFIG:-./config/skosmos-config.ttl}
        target: /var/www/html/config.ttl
        read_only: true
      - type: bind
        source: ./plugins/soilvoc-definition-source
        target: /var/www/html/plugins/soilvoc-definition-source
        read_only: true
      - type: bind
        source: ./custom-templates
        target: /var/www/html/custom-templates
        read_only: true
      - type: bind
        source: ./Soilwise_workflow_soilvoc.png
        target: /var/www/html/Soilwise_workflow_soilvoc.png
        read_only: true
volumes:
  fuseki-databases:
  fuseki-logs:
